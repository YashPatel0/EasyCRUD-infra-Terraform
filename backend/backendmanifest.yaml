apiVersion: apps/v1
kind: Deployment
metadata:
  name: studentapp
  labels:
    app: studentapp
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: studentapp
  template:
    metadata:
      labels:
        app: studentapp
    spec:
      containers:
      - name: studentapp
        image: yashpatel017/easycrud_backend:v4
        imagePullPolicy: Always
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"
          requests:
            memory: "128Mi"
            cpu: "400m"
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: studentapp-svc
  labels:
    app: studentapp
spec:
  type: LoadBalancer
  selector:
    app: studentapp
  ports:
  - port: 8080
    targetPort: 8080